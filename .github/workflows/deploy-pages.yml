name: Build and deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source and DDS
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.10
          actions-cache-folder: emsdk-cache

      - name: Configure WebAssembly engine
        run: emcmake cmake -S . -B build-wasm -DCMAKE_BUILD_TYPE=Release

      - name: Build WebAssembly engine
        run: cmake --build build-wasm --config Release --parallel 2

      - name: Build static website
        run: npm run build --prefix website

      - name: Verify deployment artifacts
        run: test -f website/dist/engine/bridge_engine.wasm

      - name: Smoke-test browser engine
        run: npm run test:wasm --prefix website

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
